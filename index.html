    <style>
        :root { --gold: #ffd700; --neon: 0 0 25px rgba(255, 215, 0, 0.9); }
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; height: 100vh; }
        
        #header { width: 100%; text-align: center; padding: 10px 0; border-bottom: 2px solid var(--gold); position: relative; background: #111; z-index: 100; }
        .game-title { font-size: 22px; font-weight: 900; color: var(--gold); text-shadow: var(--neon); margin: 0; }
        .u-id { position: absolute; left: 10px; top: 12px; background: #fff; color: #111; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        .top-info { width: 92%; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .balance-box { border: 2.5px solid var(--gold); padding: 5px 12px; border-radius: 20px; background: #000; display: flex; align-items: center; gap: 5px; box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.3); font-weight: bold; }

        #game-area { position: relative; width: 300px; height: 300px; margin-top: 10px; }
        #center-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--gold); background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; box-shadow: var(--neon); }
        #timer { font-size: 30px; font-weight: bold; color: #fff; }

        .slot { position: absolute; width: 75px; height: 75px; background: #111; border: 2.5px solid #444; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.1s; }
        .slot span { font-size: 24px; }
        .bet-txt { font-size: 10px; color: #00ffea; font-weight: bold; }
        
        .active-spin { border-color: #fff !important; box-shadow: 0 0 30px #fff; transform: scale(1.05); background: #222 !important; }
        .win-glow { background: #00ff00 !important; color: #000 !important; border: 4px solid #fff; box-shadow: 0 0 50px #00ff00; }

        /* HOT Label Styles */
        .hot-label { position: absolute; top: -5px; background: red; color: white; font-size: 9px; padding: 2px 5px; border-radius: 5px; font-weight: bold; display: none; animation: blink 0.5s infinite; z-index: 20; }
        .hot-border { border-color: red !important; box-shadow: 0 0 15px red !important; }
        @keyframes blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        #bet-bar { display: flex; gap: 4px; margin-top: 10px; }
        .chip { background: #222; color: #fff; border: 1px solid var(--gold); padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .chip.selected { background: var(--gold); color: #000; }

        #history-bar { width: 92%; background: #111; height: 35px; margin-top: 8px; border-radius: 8px; display: flex; align-items: center; padding: 0 8px; gap: 5px; border: 1px solid #333; overflow-x: hidden; position: relative; }
        .hist-item { min-width: 25px; height: 25px; background: #222; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        #leaderboard { width: 92%; height: 110px; background: #050505; margin-top: 8px; border: 1px solid #333; border-radius: 10px; overflow-y: auto; padding: 5px; }
        .lb-row { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid #111; font-size: 11px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #111; border: 2px solid var(--gold); padding: 15px; border-radius: 20px; text-align: center; }
        input, select { width: 90%; padding: 12px; margin: 8px 0; background: #000; color: #ffd700; border: 1px solid #ffd700; border-radius: 10px; font-size: 16px; }

        #win-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 4px solid var(--gold); padding: 15px; border-radius: 25px; text-align: center; z-index: 6000; width: 280px; box-shadow: 0 0 100px rgba(255, 215, 0, 0.4); }
    </style>
</head>

    <script>
        // --- Firebase Initialize ---
        var firebaseConfig = {
            apiKey: "AIzaSyAuTV33AGDrEDnkXe6GiwhA2_HEQMY8U0E",
            authDomain: "gadedporo.firebaseapp.com",
            databaseURL: "https://gadedporo-default-rtdb.firebaseio.com",
            projectId: "gadedporo",
            storageBucket: "gadedporo.firebasestorage.app",
            messagingSenderId: "280565731865",
            appId: "1:280565731865:web:b406a75969a77b53bd5088"
        };
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        // --- Globals ---
        const TG_BOT = "8690149395:AAEy-hIHok42Z3EWZ41ivH1AigqGB-D96lU", TG_CHAT = "7767594784";
        const items = [{n:'🍅',m:5,w:40},{n:'🍆',m:5,w:40},{n:'🥬',m:5,w:40},{n:'🥕',m:5,w:40},{n:'🍔',m:10,w:20},{n:'🍢',m:15,w:15},{n:'🍗',m:25,w:5},{n:'🥩',m:45,w:2}];

        let myUID = localStorage.getItem('giddy_uid') || "ID"+Math.floor(10000000+Math.random()*90000000);
        localStorage.setItem('giddy_uid', myUID);
        document.getElementById('my-id').innerText = myUID;
        document.getElementById('copy-target').innerText = myUID;

        let balance = 0, wallet = 0, dailyWin = 0, isSpinning = false, curChip = 5000, bets = Array(8).fill(0);

        function copyID() { navigator.clipboard.writeText(myUID); alert("ID Copied: " + myUID); }

        function sendTG(msg) {
            fetch(`https://api.telegram.org/bot${TG_BOT}/sendMessage?chat_id=${TG_CHAT}&text=${encodeURIComponent("🔔 GIDDY ALERT\nID: "+myUID+"\n"+msg)}`);
        }

        // --- HOT Sync Logic ---
        function updateHotSlot(timeLeft) {
            // সবার ফোনে একই সময়ে হট ঘর দেখানোর জন্য টাইম-বেজড ক্যালকুলেশন
            let seed = Math.floor(Date.now() / 10000); // প্রতি ১০ সেকেন্ডে পরিবর্তন
            let hotIdx = (seed % 8);
            
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('hot-border'));
            document.querySelectorAll('.hot-label').forEach(l => l.style.display = 'none');

            if(timeLeft > 3) { // শেষ ৩ সেকেন্ডে হট দেখাবে না
                let target = document.getElementById(`slot-${hotIdx}`);
                if(target) {
                    target.classList.add('hot-border');
                    target.querySelector('.hot-label').style.display = 'block';
                }
            }
        }

        // --- Server Round Sync ---
        function syncServer() {
            setInterval(() => {
                const now = Date.now();
                const timeLeft = 30 - (Math.floor(now / 1000) % 30);
                const currentRound = (Math.floor(now / 30000) % 5000) + 1;
                document.getElementById('timer').innerText = timeLeft < 10 ? "0"+timeLeft : timeLeft;
                document.getElementById('round-text').innerText = "ROUND " + currentRound;
                
                if(!isSpinning) updateHotSlot(timeLeft);

                if (timeLeft === 28 && isSpinning) isSpinning = false;
                if (timeLeft === 1 && !isSpinning) runSpin(currentRound);
            }, 1000);
        }

        function getWinner(round) {
            let s = round * 543.21;
            let r = (Math.sin(s) * 10000) % 202;
            let c = 0; let val = Math.abs(r);
            for (let i = 0; i < items.length; i++) { c += items[i].w; if (val <= c) return i; }
            return 0;
        }

        database.ref('players/'+myUID).on('value', s => {
            if(s.exists()){ balance=s.val().balance; wallet=s.val().wallet||0; dailyWin=s.val().dailyWin||0;
            document.getElementById('balance').innerText=balance.toLocaleString();
            document.getElementById('wallet-val').innerText=`$${wallet.toFixed(2)}`; }
            else { database.ref('players/'+myUID).set({balance:20000, wallet:0, dailyWin:0}); }
        });

        database.ref('global/history').on('value', s => {
            if(s.exists()){ 
                let h=''; 
                let data = s.val();
                // নতুন রেজাল্ট সামনে দেখাবে (Reverse order)
                data.slice(-20).reverse().forEach(x=> h+=`<div class="hist-item">${x}</div>`);
                document.getElementById('history-bar').innerHTML=h; 
            }
        });

        database.ref('players').orderByChild('dailyWin').limitToLast(24).on('value', s => {
            let l=[]; s.forEach(p=>{if(p.val().dailyWin>0)l.push({id:p.key, w:p.val().dailyWin})});
            l.reverse(); let h=''; l.forEach(u=>h+=`<div class="lb-row"><span>${u.id}</span><span style="color:gold">${u.w.toLocaleString()}</span></div>`);
            document.getElementById('lb-list').innerHTML=h;
        });

        const container = document.getElementById('slots-container');
        items.forEach((it, i) => {
            const angle = (i/8)*Math.PI*2;
            const x = 110 + 110*Math.cos(angle-Math.PI/2), y = 110 + 110*Math.sin(angle-Math.PI/2);
            const div = document.createElement('div'); div.className='slot'; div.id=`slot-${i}`;
            div.style.left=x+'px'; div.style.top=y+'px';
            div.innerHTML=`<div class="hot-label">HOT</div><span>${it.n}</span><b style="font-size:10px;color:gold">${it.m}x</b><div class="bet-txt" id="bv-${i}">0</div>`;
            div.onclick=()=>{ if(isSpinning||balance<curChip) return; if(bets[i]==0 && bets.filter(b=>b>0).length>=6) return;
            balance-=curChip; bets[i]+=curChip; document.getElementById(`bv-${i}`).innerText=bets[i].toLocaleString();
            database.ref('players/'+myUID).update({balance:balance}); database.ref('live_bets/'+i+'/'+myUID).set(bets[i]); };
            container.appendChild(div);
        });

        function runSpin(r) {
            isSpinning = true; 
            document.querySelectorAll('.hot-label').forEach(l => l.style.display = 'none');
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('hot-border'));
            
            let idx = getWinner(r); let step = 0;
            let intv = setInterval(() => {
                document.querySelectorAll('.slot').forEach(s=>s.classList.remove('active-spin'));
                document.getElementById(`slot-${step%8}`).classList.add('active-spin');
                if(step++ >= 30+idx){ clearInterval(intv); endRound(idx, r); }
            }, 80);
        }

        async function endRound(idx, r) {
            let win = bets[idx]*items[idx].m; dailyWin+=win; balance+=win;
            database.ref('players/'+myUID).update({balance:balance, dailyWin:dailyWin});
            document.getElementById('pop-res-icon').innerText=items[idx].n;
            document.getElementById('pop-my-bet').innerText=bets[idx].toLocaleString();
            document.getElementById('pop-my-win').innerText=win.toLocaleString();
            const snap = await database.ref('live_bets/'+idx).once('value');
            let winners = []; snap.forEach(u => winners.push({id:u.key, a:u.val()*items[idx].m}));
            winners.sort((a,b)=>b.a-a.a);
            let h = '<b>Top Winners:</b><br>'; winners.slice(0,3).forEach((w,i)=> h+=`${i+1}. ${w.id} - ${w.a}<br>`);
            document.getElementById('pop-winners').innerHTML=h||"No winners";
            document.getElementById('win-popup').style.display='block';
            document.getElementById(`slot-${idx}`).classList.add('win-glow');

            // হিস্টোরি আপডেট (সবার জন্য সিঙ্ক হবে)
            if(myUID.includes("ID1") || Math.random() < 0.1){
                database.ref('global/history').once('value', s => {
                    let arr = s.exists() ? s.val() : [];
                    if(arr[arr.length-1] !== items[idx].n){ 
                        arr.push(items[idx].n); 
                        if(arr.length>30) arr.shift(); 
                        database.ref('global/history').set(arr); 
                    }
                });
            }
            setTimeout(() => {
                document.getElementById('win-popup').style.display='none';
                document.querySelectorAll('.slot').forEach(s=>s.classList.remove('win-glow','active-spin'));
                document.querySelectorAll('.bet-txt').forEach(t=>t.innerText="0");
                bets.fill(0); database.ref('live_bets').remove();
            }, 5000);
        }

        function showTab(id){ document.querySelectorAll('.tab-c').forEach(t=>t.style.display='none'); document.getElementById(id).style.display='block'; }
        function doC2D(){
            let amt = parseInt(document.getElementById('c2d-in').value);
            if(balance>=amt && amt>=10000){ balance-=amt; wallet+=(amt/10000);
            database.ref('players/'+myUID).update({balance:balance, wallet:wallet});
            sendTG(`💰 Break Coins\nExchanged: ${amt.toLocaleString()} Coins\nAdded: $${(amt/10000).toFixed(2)} to Wallet`);
            alert("Success!"); document.getElementById('c2d-in').value=""; }
        }
        function doD2C(){
            let amt = parseFloat(document.getElementById('d2c-in').value);
